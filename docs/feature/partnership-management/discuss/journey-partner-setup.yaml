journey:
  name: "Partner Profile Setup"
  goal: "Build a rich partner profile that makes partner capabilities visible to all proposal agents"
  persona: "Phil Santos -- engineer, 2-3 SBIR proposals/year, known partners CU Boulder, NDSU, SWRI"
  job_stories:
    - JS-1  # Repeat Partner Proposal Content
    - JS-2  # New Partner Onboarding

  emotional_arc:
    start: "Purposeful but apprehensive (is this going to be tedious?)"
    middle: "Engaged as fit scoring connections become clear"
    end: "Confident that the partner is now visible to the plugin"

steps:
  - id: 1
    name: "Mode Select"
    command: "/proposal partner-setup"

    tui_mockup: |
      +-- Partner Setup ----------------------------------------+
      | Existing partners on file:                              |
      |   1. ${partner_name} (${partner_type})                  |
      |                                                         |
      | Options:                                                |
      |   (n) new   (u) update   (l) list   (c) cancel         |
      +---------------------------------------------------------+

    shared_artifacts:
      - name: "partner_list"
        source: "~/.sbir/partners/"
        displayed_as: "${partner_name}, ${partner_type}"
        consumers:
          - "Step 1: Mode Select display"
          - "Step 5: Save confirmation"
          - "/solicitation-find: partner selection"

    emotional_state:
      entry: "Purposeful"
      exit: "Oriented -- knows what exists, has clear next action"

    integration_checkpoint: |
      ~/.sbir/partners/ directory must exist.
      Partner list must be readable via filesystem glob.

  - id: 2
    name: "Research"
    command: "Internal (web search triggered automatically for new partners)"

    tui_mockup: |
      +-- Partner Research -------------------------------------+
      | Searching for ${partner_name}...                        |
      |   [1/3] SBIR/STTR awards...                             |
      |   [2/3] Research areas...                                |
      |   [3/3] Key personnel...                                 |
      |                                                         |
      | PARTNER RESEARCH RESULTS                                |
      | SBIR History: ${award_count} awards (${agencies})       |
      | Research Areas: ${research_areas}                        |
      | Key Personnel: ${found_personnel}                       |
      | Confidence: ${confidence_level}                         |
      |                                                         |
      |   (c) continue   (d) discard   (q) quit                |
      +---------------------------------------------------------+

    shared_artifacts:
      - name: "research_findings"
        source: "Web search results (ephemeral)"
        displayed_as: "${award_count}, ${agencies}, ${research_areas}, ${found_personnel}"
        consumers:
          - "Step 3: Pre-populate interview fields"
          - "Step 4: Preview (verify accuracy)"

    emotional_state:
      entry: "Curious"
      exit: "Impressed -- plugin is doing useful work"

    integration_checkpoint: |
      Research findings must be structured for merge into draft profile.
      Failed searches must not block the workflow.

  - id: 3
    name: "Gather"
    command: "Internal (conversational interview or document extraction)"

    tui_mockup: |
      +-- Partner Interview: ${partner_name} -------------------+
      | SECTION ${n} of 6: ${section_name}                      |
      |                                                         |
      | ${fit_scoring_explanation}                               |
      |                                                         |
      | From research: ${pre_populated_value}                   |
      | Is this correct? (y/n/edit)                             |
      +---------------------------------------------------------+

    shared_artifacts:
      - name: "partner_profile_draft"
        source: "Accumulated from interview sections"
        displayed_as: "Section-by-section fields"
        consumers:
          - "Step 4: Preview display"
          - "Step 5: Validation input"

    emotional_state:
      entry: "Engaged"
      exit: "Thorough -- all sections covered"

    integration_checkpoint: |
      All 6 sections must be collected or explicitly skipped.
      Skipped sections produce appropriate empty values.
      Partner profile schema must mirror company profile structure.

  - id: 4
    name: "Preview"
    command: "Internal (auto-triggered after gather)"

    tui_mockup: |
      +-- Partner Profile Preview ------------------------------+
      | PARTNER: ${partner_name}                                |
      | Type: ${partner_type}                                   |
      | Capabilities: ${capabilities}                           |
      | Key Personnel: ${personnel_count} entries               |
      | Facilities: ${facilities_summary}                       |
      | Past Collabs: ${collab_count}                           |
      | STTR Ready: ${sttr_ready}                               |
      |                                                         |
      | COMBINED PROFILE (You + ${partner_name})                |
      | Overlap: ${capability_overlap}                          |
      | Unique to you: ${your_unique}                           |
      | Unique to partner: ${partner_unique}                    |
      |                                                         |
      |   (s) save   (e) edit   (c) cancel                     |
      +---------------------------------------------------------+

    shared_artifacts:
      - name: "combined_capability_analysis"
        source: "Computed from company-profile.json + partner draft"
        displayed_as: "${capability_overlap}, ${your_unique}, ${partner_unique}"
        consumers:
          - "Step 4: Preview display"
          - "/proposal-shape: approach generation"
          - "/proposal-wave-strategy: teaming section"

    emotional_state:
      entry: "Reviewing"
      exit: "Confident and in control"

    integration_checkpoint: |
      Preview must show combined analysis (not just partner data alone).
      Company profile must be loadable at this step.

  - id: 5
    name: "Validate and Save"
    command: "Internal (triggered by save confirmation)"

    tui_mockup: |
      +-- Partner Saved ----------------------------------------+
      | Location: ~/.sbir/partners/${partner_slug}.json         |
      | Status: Validated and saved                             |
      |                                                         |
      | ${partner_name} is now available to:                    |
      |   /solicitation-find, /proposal-shape,                  |
      |   /proposal-wave-strategy, /proposal-draft              |
      +---------------------------------------------------------+

    shared_artifacts:
      - name: "partner_profile_file"
        source: "~/.sbir/partners/${partner_slug}.json"
        displayed_as: "File path"
        consumers:
          - "/solicitation-find: partnership scoring"
          - "/proposal-shape: approach generation"
          - "/proposal-wave-strategy: teaming section"
          - "/proposal-draft: section writing"
          - "/proposal partner-setup: partner list (Step 1)"

    emotional_state:
      entry: "Expectant"
      exit: "Satisfied -- partner is live in the system"

    integration_checkpoint: |
      Partner profile must pass schema validation before write.
      Atomic write protocol (tmp -> rename).
      Partner file must be discoverable by all consuming agents.

integration_validation:
  shared_artifact_consistency:
    - artifact: "partner_profile_schema"
      must_match_across: [3, 4, 5]
      failure_message: "Partner profile structure must be consistent from gather through save"

    - artifact: "partner_slug"
      must_match_across: [1, 5]
      failure_message: "Partner identifier must be consistent in listing and file naming"

    - artifact: "combined_capabilities"
      must_match_across: [4]
      failure_message: "Combined analysis must reflect both company profile and partner profile"
